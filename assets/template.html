<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} // Tactical Briefing {{ID}}</title>
    <meta name="description" content="{{DESCRIPTION}}">
    
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TechArticle",
      "headline": "{{TITLE}}",
      "description": "{{DESCRIPTION}}",
      "author": {
        "@type": "Person",
        "name": "Toby Nichol"
      },
      "datePublished": "{{DATE}}"
    }
    </script>
</head>
<body class="briefing-mode">
    <main class="hud-wrapper single-module-layout">
        <article class="hud-module briefing-container">
            <span class="module-meta">BRIEFING_ID: {{ID}} // CATEGORY: {{CATEGORY}}</span>
            
            <header id="terminal-header">
                <a href="../index.html" class="back-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
                    RETURN_TO_ROOT
                </a>
                <h1>{{TITLE}}</h1>
                <p class="subtitle">{{SUBTITLE}}</p>
            </header>

            <div class="briefing-content">
                {{CONTENT}}
            </div>
        </article>
    </main>

    <div id="terminal-bg" aria-hidden="true"></div>

    <script type="module" src="../js/scripts.js"></script>
</body>
</html>
