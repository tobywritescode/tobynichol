<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toby Nichol | Personal Terminal</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <main class="hud-wrapper single-module-layout">
        <section id="terminal" class="hud-module">
            <span class="module-meta">ID: TN_SYS_001</span>
            
            <div id="terminal-header">
                <h1>Toby Nichol</h1>
                <p class="subtitle">Interactive Intelligence Terminal // v2.0</p>
            </div>

            <div id="terminal-history">
                <!-- System output will be injected here -->
            </div>

            <div id="terminal-prompt">
                <span class="prompt-user">[USER@TOBYNICHOL]:~ ></span>
                <input type="text" id="command-input" autofocus spellcheck="false" autocomplete="off">
            </div>
        </section>
    </main>

    <!-- Background remains for CRT effect -->
    <div id="terminal-bg" aria-hidden="true"></div>

    <script type="module" src="js/scripts.js"></script>
    <script>
      lucide.createIcons();
    </script>
</body>
</html>
